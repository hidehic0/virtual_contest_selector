<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ABC VirtualContestSelector</title>
  </head>
  <body>
    <h2>ABC VirtualContestSelector</h2>
    <p>ABCのランダムなコンテストを抽出するツールです。</p>
    <p>フォームの内容は、localStorageに保存されます。</p>
    <div>
      <h3>使うコンテストの下限、上限</h3>
      <input type="number" id="contest_lower" placeholder="Example: 212" />
      <input type="number" id="contest_upper" placeholder="Example: 450" />
    </div>

    <div id="response"></div>

    <h3>除外するコンテスト</h3>
    <textarea
      placeholder="例: ABC256"
      id="ignore_contests"
      style="field-sizing: content; min-height: 5em; min-width: 10em"
    ></textarea>

    <button id="generate_button">抽出</button>

    <script src="./index.js"></script>
  </body>
</html>
