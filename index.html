<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ABC Selector</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --bg-accent: #edf1f6;
        --card: rgba(255, 255, 255, 0.92);
        --card-border: rgba(34, 46, 61, 0.08);
        --text: #121826;
        --muted: #627086;
        --primary: #355c9a;
        --primary-hover: #234478;
        --danger: #a23d3d;
        --shadow: 0 12px 30px rgba(20, 30, 44, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", "Meiryo", system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 38%),
          radial-gradient(circle at top right, rgba(232, 237, 244, 0.95), transparent 34%),
          linear-gradient(160deg, var(--bg) 0%, var(--bg-accent) 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        background-size: 32px 32px;
        opacity: 0.35;
        mask-image: radial-gradient(circle at center, black 35%, transparent 100%);
      }

      main {
        position: relative;
        max-width: 860px;
        margin: 0 auto;
        padding: 44px 24px 56px;
      }

      .shell {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 28px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .hero {
        padding: 30px 32px 20px;
        background:
          linear-gradient(135deg, rgba(53, 92, 154, 0.06), rgba(255, 255, 255, 0)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.8), transparent);
        border-bottom: 1px solid rgba(34, 46, 61, 0.08);
      }

      .eyebrow {
        margin: 0 0 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--primary);
        font-size: 0.8rem;
        font-weight: 700;
      }

      h2 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.25rem);
        line-height: 1.1;
      }

      .intro {
        max-width: 42rem;
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .content {
        display: grid;
        gap: 20px;
        padding: 26px 32px 32px;
      }

      .panel {
        border: 1px solid rgba(34, 46, 61, 0.08);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.82);
        padding: 20px;
      }

      h3 {
        margin: 0 0 14px;
        font-size: 1.05rem;
      }

      .range-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .field-label {
        display: block;
        margin: 0 0 8px;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid rgba(34, 46, 61, 0.16);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.96);
        color: var(--text);
        padding: 12px 14px;
        outline: none;
        transition:
          border-color 120ms ease,
          box-shadow 120ms ease;
      }

      input:focus,
      textarea:focus {
        border-color: rgba(53, 92, 154, 0.5);
        box-shadow: 0 0 0 2px rgba(53, 92, 154, 0.1);
      }

      textarea {
        min-height: 9rem;
        resize: vertical;
        line-height: 1.6;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        cursor: pointer;
        transition:
          background-color 120ms ease,
          opacity 120ms ease,
          border-color 120ms ease;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      #generate_button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 6px;
        background: linear-gradient(135deg, var(--primary), var(--primary-hover));
        color: white;
        box-shadow: none;
      }

      #response {
        display: grid;
        gap: 12px;
        min-height: 3.25rem;
        align-content: start;
      }

      #response:empty::before {
        content: "条件を入力して「抽出」を押すと、ここに結果が表示されます。";
        color: var(--muted);
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px dashed rgba(34, 46, 61, 0.16);
      }

      #response a,
      #response button {
        width: fit-content;
      }

      #response a {
        display: grid;
        gap: 0.25rem;
        min-width: min(100%, 18rem);
        padding: 16px 18px;
        border-radius: 18px;
        text-decoration: none;
        color: var(--text);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 247, 250, 0.98));
        border: 1px solid rgba(53, 92, 154, 0.16);
        box-shadow: none;
        position: relative;
        transition:
          border-color 120ms ease,
          background-color 120ms ease;
      }

      #response a:hover {
        border-color: rgba(53, 92, 154, 0.3);
        background: linear-gradient(180deg, rgba(255, 255, 255, 1), rgba(242, 246, 250, 1));
      }

      #response a::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        box-shadow: inset 2px 0 0 var(--primary);
        pointer-events: none;
      }

      #add_ignore_list_button {
        justify-self: start;
        background: transparent;
        color: var(--primary-hover);
        border: 1px solid rgba(53, 92, 154, 0.2);
        padding-inline: 16px;
      }

      .error_message {
        margin: 0;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(158, 47, 47, 0.1);
        color: var(--danger);
        border: 1px solid rgba(158, 47, 47, 0.18);
      }

      @media (max-width: 640px) {
        main {
          padding: 14px;
        }

        .hero,
        .content {
          padding-left: 18px;
          padding-right: 18px;
        }

        .range-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell">
        <header class="hero">
          <h2>ABC Selector</h2>
          <p class="intro">
            ABC(AtCoder Beginner Contest)のランダムな回を抽出するツールです。 入力内容は
            localStorage に保存されます。
          </p>
        </header>

        <div class="content">
          <section class="panel">
            <h3>対象にするコンテストの範囲</h3>
            <div class="range-grid">
              <label>
                <span class="field-label">下限</span>
                <input type="number" id="contest_lower" placeholder="Example: 212" />
              </label>
              <label>
                <span class="field-label">上限</span>
                <input type="number" id="contest_upper" placeholder="Example: 450" />
              </label>
            </div>
          </section>

          <section class="panel">
            <h3>抽出結果</h3>
            <div id="response"></div>
          </section>

          <button id="generate_button">抽出</button>

          <section class="panel">
            <h3>除外するコンテスト</h3>
            <textarea
              placeholder="例: ABC256"
              id="ignore_contests"
              style="field-sizing: content; min-height: 5em; min-width: 10em"
            ></textarea>
          </section>
        </div>
      </section>
    </main>

    <script src="./index.js" defer></script>
  </body>
</html>
