<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ABC Selector</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8f9fa;
        --bg-accent: #f3f4f7;
        --card: #fff;
        --card-border: #e5e7eb;
        --text: #22232a;
        --muted: #7a7d85;
        --primary: #2d3a4f;
        --primary-hover: #1a2233;
        --danger: #a23d3d;
        --shadow: 0 6px 24px rgba(34, 42, 60, 0.10);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', 'Yu Gothic', 'Meiryo', system-ui, sans-serif;
        color: var(--text);
        background:
          linear-gradient(160deg, var(--bg) 0%, var(--bg-accent) 100%);
        letter-spacing: 0.01em;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        background-size: 32px 32px;
        opacity: 0.35;
        mask-image: radial-gradient(circle at center, black 35%, transparent 100%);
      }

      main {
        position: relative;
        max-width: 860px;
        margin: 0 auto;
        padding: 44px 24px 56px;
      }

      .shell {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 32px;
        box-shadow: var(--shadow);
        overflow: hidden;
        padding-bottom: 2px;
      }

      .hero {
        padding: 36px 40px 24px;
        background:
          linear-gradient(135deg, rgba(45, 58, 79, 0.04), rgba(255,255,255,0)),
          linear-gradient(180deg, rgba(255,255,255,0.92), transparent);
        border-bottom: 1px solid var(--card-border);
      }

      .eyebrow {
        margin: 0 0 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--primary);
        font-size: 0.8rem;
        font-weight: 700;
        opacity: 0.7;
      }

      h2 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.25rem);
        line-height: 1.1;
      }

      .intro {
        max-width: 42rem;
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.7;
        font-size: 1.08rem;
      }

      .content {
        display: grid;
        gap: 28px;
        padding: 36px 40px 36px;
      }

      .panel {
        border: 1px solid var(--card-border);
        border-radius: 20px;
        background: rgba(255,255,255,0.97);
        padding: 28px 24px;
        box-shadow: 0 2px 8px rgba(34,42,60,0.03);
      }

      h3 {
        margin: 0 0 14px;
        font-size: 1.05rem;
      }

      .range-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .field-label {
        display: block;
        margin: 0 0 8px;
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 500;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--card-border);
        border-radius: 14px;
        background: rgba(255,255,255,0.98);
        color: var(--text);
        padding: 13px 16px;
        outline: none;
        font-size: 1rem;
        transition:
          border-color 120ms ease,
          box-shadow 120ms ease;
      }

      input:focus,
      textarea:focus {
        border-color: rgba(53, 92, 154, 0.5);
        box-shadow: 0 0 0 2px rgba(53, 92, 154, 0.1);
      }

      textarea {
        min-height: 9rem;
        resize: vertical;
        line-height: 1.6;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 28px;
        cursor: pointer;
        font-weight: 600;
        font-size: 1rem;
        background: linear-gradient(90deg, var(--primary) 60%, var(--primary-hover) 100%);
        color: #fff;
        box-shadow: 0 2px 8px rgba(34,42,60,0.06);
        transition:
          background-color 120ms ease,
          opacity 120ms ease,
          border-color 120ms ease;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      #generate_button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 6px;
        background: linear-gradient(90deg, var(--primary) 60%, var(--primary-hover) 100%);
        color: #fff;
        box-shadow: 0 2px 8px rgba(34,42,60,0.06);
        font-weight: 600;
        font-size: 1rem;
      }

      #response {
        display: grid;
        gap: 12px;
        min-height: 3.25rem;
        align-content: start;
      }

      #response:empty::before {
        content: "条件を入力して「抽出」を押すと、ここに結果が表示されます。";
        color: var(--muted);
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px dashed rgba(34, 46, 61, 0.16);
      }

      .response-row {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      #response a,
      #response button {
        width: fit-content;
      }

      #response a {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        min-width: min(100%, 18rem);
        padding: 16px 18px;
        border-radius: 18px;
        text-decoration: underline;
        color: var(--primary);
        background: #fff;
        border: 1px solid var(--card-border);
        box-shadow: 0 1px 4px rgba(34,42,60,0.03);
        font-weight: 500;
        font-size: 1.08rem;
        position: relative;
        transition:
          border-color 120ms ease,
          background-color 120ms ease,
          color 120ms ease;
      }

      #response a:hover {
        border-color: var(--primary);
        background: #f8f9fa;
        color: var(--primary-hover);
        text-decoration: underline;
        box-shadow: 0 2px 8px rgba(45,58,79,0.07);
      }



      #add_ignore_list_button {
        justify-self: start;
        background: linear-gradient(90deg, var(--primary) 60%, var(--primary-hover) 100%);
        color: #fff;
        border: 0;
        border-radius: 999px;
        padding: 12px 28px;
        font-weight: 600;
        font-size: 1rem;
        box-shadow: 0 2px 8px rgba(34,42,60,0.06);
        transition:
          background-color 120ms ease,
          opacity 120ms ease,
          border-color 120ms ease;
      }

      .error_message {
        margin: 0;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(158, 47, 47, 0.07);
        color: var(--danger);
        border: 1px solid rgba(158, 47, 47, 0.13);
      }

      @media (max-width: 640px) {
        main {
          padding: 8px;
        }

        .hero,
        .content {
          padding-left: 8px;
          padding-right: 8px;
        }

        .range-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell">
        <header class="hero">
          <h2>ABC Selector</h2>
          <p class="intro">
            ABC(AtCoder Beginner Contest)のランダムな回を抽出するツールです。 入力内容は
            localStorage に保存されます。
          </p>
        </header>

        <div class="content">
          <section class="panel">
            <h3>対象にするコンテストの範囲</h3>
            <div class="range-grid">
              <label>
                <span class="field-label">下限</span>
                <input
                  type="text"
                  id="contest_lower"
                  placeholder="example: 212"
                  inputmode="numeric"
                  oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                />
              </label>
              <label>
                <span class="field-label">上限</span>
                <input
                  type="text"
                  id="contest_upper"
                  placeholder="example: 450"
                  inputmode="numeric"
                  oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                />
              </label>
            </div>
          </section>

          <section class="panel">
            <h3>抽出結果</h3>
            <div id="response"></div>
          </section>

          <button id="generate_button">抽出</button>

          <section class="panel">
            <h3>除外するコンテスト</h3>
            <textarea
              placeholder="例: ABC256"
              id="ignore_contests"
              style="field-sizing: content; min-height: 5em; min-width: 10em"
            ></textarea>
          </section>
        </div>
      </section>
    </main>

    <script src="./index.js" defer></script>
  </body>
</html>
